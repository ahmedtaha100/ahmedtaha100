name: Generate Stats Cards

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate cards
        run: |
          curl -o stats.svg "https://github-readme-stats-fast.vercel.app/api?username=ahmedtaha100&theme=dark&hide_border=false&include_all_commits=true&count_private=true&rank_icon=percentile"
          curl -o languages.svg "https://github-readme-stats-fast.vercel.app/api/top-langs/?username=ahmedtaha100&theme=dark&hide_border=false&include_all_commits=true&count_private=true&layout=compact"

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add stats.svg languages.svg
          git commit -m "Update stats" || exit 0
          git push
